name: GOES-19 Tucumán

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

jobs:
  crop-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install Pillow requests

      - name: Correr crop
        run: python crop.py

      - name: Commit y push
        run: |
          git config user.name  "goes19-bot"
          git config user.email "bot@goes19"
          git add tucuman.png last_update.txt
          git diff --cached --quiet || git commit -m "update $(cat last_update.txt)"
          git push
